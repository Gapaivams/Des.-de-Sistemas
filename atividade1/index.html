<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    
</head>
<body>
    <div class="container-fluid bg-light">
        <header class="bg-black text-white text-center p-4">
            <h1 class="p-2">Jogos Favoritos</h1>
            <h2>Insira seus jogos Favoritos</h2>
        </header>

        <main class="m-5">
            <form class="form-horizontal" onsubmit="handleSubmit(event)">

                <div class="form-group m-3">
                    <div class="row">
                        <label for="gameName" class="control-label col-sm-1">Nome do jogo</label>
                        <div class="col-sm-11">
                            <input type="text" class="form-control" id="gameName" placeholder="nome do jogo">
                        </div>
                    </div>
                </div>


                <div class="form-group m-3">
                    <div class="row">
                        <label for="gameDesc" class="control-label col-sm-1">Descrição do jogo</label>
                        <div class="col-sm-11">
                            <input type="text" class="form-control" id="gameDesc" placeholder="descrição">
                        </div>
                    </div>
                </div>


                <div class="row m-3">
                    <div class="col-6">
                        <div class="form-group">
                            <div class="row">
                                <label for="gameDate" class="control-label col-2">Ano de Lançamento</label>
                                <div class="col-10">
                                    <input type="date" class="form-control" id="gameDate" placeholder="dd/MM/yyyy">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-6">
                        <div class="form-group">
                            <div class="row">
                                <label for="gameRating" class="control-label col-2">Restrição de idade</label>                        
                                <div class="col-10">
                                    <select class="form-select" aria-label="Default select example">
                                        <option selected>Classificações</option>
                                        <option value="L">L</option>
                                        <option value="10+">10+</option>
                                        <option value="18+">18+</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    
                </div>


                <div class="form-group m-3">
                    <div class="row">
                        <label for="gameImage" class="control-label col-sm-1">Imagem</label>
                        <div class="col-sm-11">
                            <input type="file" class="form-control" id="gameImage" accept="image/*">
                            <div class="row">
                                <img class="col-6" id="preview" style="max-width:200px; margin-top:10px;">
                                <div class="col-4"></div>
                                <button class="col-2 btn btn-outline-danger" style="max-width:200px; max-height: 50px; margin-top:10px;" onclick="cleanPreview()">limpar</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="row m-5">
                    <button class="btn btn-success">Enviar Jogo</button>
                </div>

            </form>
        </main>

        <section class="game-menu bg-secondary" id="gameMenu">
            <div class="row">
                <div class="col-2">

                </div>
                <div class="col-4 mt-3 border border-3 border-black d-flex flex-column justify-content-around">
                    <h3 id="name" class="text-white"></h3>
                    <p id="desc" class="text-white"></p>

                    <div class="row border border-2 border-black">
                        <div class="col-6">
                            <p id="date" class="text-white"></p>
                        </div>
                        
                        <div class="col-6">
                            <p id="rating" class="text-white"></p>
                        </div>
                    </div>

                </div>

                <div class="col-6">
                    <img id="cover" src="" alt="game cover">
                </div>
            </div>
        </section>


    </div>





    <script src="script/script.js"></script>
</body>
</html>
